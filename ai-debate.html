<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Council</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0f; --surface: #16161a; --border: #2a2a32;
    --text: #e8e8f0; --muted: #6b6b80;
    --claude: #c084fc; --gpt: #34d399; --gemini: #60a5fa; --grok: #fb923c;
    --consensus: #fbbf24; --error: #f87171;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100vh; }
  header { padding: 1.5rem 1.25rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 1rem; }
  header h1 { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; font-weight: 600; }
  header span { font-size: 0.7rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .query-area { padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .query-box { display: flex; gap: 0.6rem; align-items: flex-end; }
  textarea { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem 0.9rem; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 300; resize: none; outline: none; min-height: 52px; max-height: 160px; line-height: 1.5; }
  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: var(--muted); }
  
  /* Поле для выбора скриншота */
  .file-input-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
  .file-input-wrapper label { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--muted); cursor: pointer; }
  .file-input-wrapper input { font-size: 0.75rem; color: var(--text); font-family: 'IBM Plex Mono', monospace; }

  button#askBtn { background: var(--text); color: var(--bg); border: none; border-radius: 8px; padding: 0.7rem 1.1rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
  button#askBtn:disabled { opacity: 0.35; cursor: not-allowed; }
  .arena { padding: 0 1rem 3rem; display: none; flex-direction: column; gap: 1.25rem; }
  .arena.visible { display: flex; }
  .phase-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 0.4rem 0 0.2rem; border-top: 1px solid var(--border); }
  .agents-grid { display: flex; flex-direction: column; gap: 0.75rem; }
  .agent-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.1rem; min-height: 80px; }
  .agent-card.gpt    { border-left: 3px solid var(--gpt); }
  .agent-card.gemini { border-left: 3px solid var(--gemini); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
  .agent-card.active { animation: pulse 1.4s infinite; }
  .agent-name { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; font-weight: 600; margin-bottom: 0.6rem; }
  .agent-card.gpt    .agent-name { color: var(--gpt); }
  .agent-card.gemini .agent-name { color: var(--gemini); }
  .agent-text { font-size: 0.8rem; line-height: 1.6; color: var(--text); white-space: pre-wrap; }
  .agent-text.placeholder { color: var(--muted); font-style: italic; }
  .discussion-block { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.1rem; }
  .discussion-row { display: flex; gap: 0.6rem; margin-bottom: 0.85rem; }
  .disc-who { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; font-weight: 600; min-width: 56px; padding-top: 2px; flex-shrink: 0; }
  .disc-who.gpt    { color: var(--gpt); }
  .disc-who.gemini { color: var(--gemini); }
  .disc-text { font-size: 0.8rem; line-height: 1.6; color: var(--text); }
  .consensus-card { background: #1a180d; border: 1px solid #3d3510; border-left: 3px solid var(--consensus); border-radius: 10px; padding: 1.1rem 1.25rem; }
  .consensus-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--consensus); font-weight: 600; margin-bottom: 0.6rem; letter-spacing: 0.06em; text-transform: uppercase; }
  .consensus-text { font-size: 0.88rem; line-height: 1.7; color: var(--text); white-space: pre-wrap; }
  .spinner { display: inline-block; width: 9px; height: 9px; border: 2px solid var(--border); border-top-color: var(--muted); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 5px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { font-size: 0.75rem; color: var(--error); font-family: 'IBM Plex Mono', monospace; margin-top: 0.4rem; }
</style>
</head>
<body>
<header>
  <h1>AI Council</h1>
  <span>// Скриншоты · Серверный дебат</span>
</header>

<div class="query-area">
  <div class="file-input-wrapper">
    <label for="imageFile">📸 Скриншот:</label>
    <input type="file" id="imageFile" accept="image/*">
  </div>
  <div class="query-box">
    <textarea id="questionInput" placeholder="Задайте вопрос к скриншоту..." rows="2"></textarea>
    <button id="askBtn" onclick="runServerDebate()">Спросить →</button>
  </div>
  <div id="errorMsg" class="error-msg"></div>
</div>

<div class="arena" id="arena">
  <div class="phase-label">① Независимые ответы по картинке</div>
  <div class="agents-grid">
    <div class="agent-card gpt" id="card-gpt">
      <div class="agent-name">GPT-4o · OpenAI</div>
      <div class="agent-text placeholder" id="text-gpt">ожидание...</div>
    </div>
    <div class="agent-card gemini" id="card-gemini">
      <div class="agent-name">Gemini · Google</div>
      <div class="agent-text placeholder" id="text-gemini">ожидание...</div>
    </div>
  </div>

  <div class="phase-label" id="phaseDiscuss" style="display:none">② Обсуждение агентов</div>
  <div class="discussion-block" id="discussBlock" style="display:none"></div>

  <div class="phase-label" id="phaseConsensus" style="display:none">③ Итоговый консенсус (Claude)</div>
  <div class="consensus-card" id="consensusCard" style="display:none">
    <div class="consensus-label">▸ Общий ответ сервера</div>
    <div class="consensus-text" id="consensusText"></div>
  </div>
</div>

<script>
function setCard(id, text) {
  const el = document.getElementById('text-' + id);
  el.textContent = text;
  el.classList.remove('placeholder');
}

async function runServerDebate() {
  const prompt = document.getElementById('questionInput').value.trim();
  const fileInput = document.getElementById('imageFile');
  
  if (!prompt || fileInput.files.length === 0) {
    document.getElementById('errorMsg').textContent = "⚠ Введите текст и выберите скриншот!";
    return;
  }

  document.getElementById('errorMsg').textContent = "";
  const btn = document.getElementById('askBtn');
  btn.disabled = true;
  btn.textContent = "Сервер думает...";
  
  document.getElementById('arena').classList.add('visible');
  ['phaseDiscuss','discussBlock','phaseConsensus','consensusCard'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });

  // Готовим данные формы для отправки на FastAPI
  const formData = new FormData();
  formData.append("prompt", prompt);
  formData.append("file", fileInput.files[0]);

  try {
    // Меняй этот URL на адрес своего запущенного сервера
    const response = await fetch("http://127.0.0.1:8000/api/debate", {
      method: "POST",
      body: formData
    });
    
    const data = await response.json();

    // Заполняем карточки ответами от сервера
    setCard('gpt', data.gpt);
    setCard('gemini', data.gemini);

    // Показываем обсуждение
    document.getElementById('phaseDiscuss').style.display = '';
    document.getElementById('discussBlock').style.display = '';
    
    const lines = data.discussion.split('\n').filter(l => l.trim());
    let html = "";
    for (const line of lines) {
      const who = line.startsWith("GPT:") ? "gpt" : line.startsWith("GEMINI:") ? "gemini" : null;
      if (who) {
        const text = line.replace(/^(GPT|GEMINI):/, "").trim();
        html += `<div class="discussion-row"><span class="disc-who ${who}">${who.toUpperCase()}</span><span class="disc-text">${text}</span></div>`;
      }
    }
    document.getElementById('discussBlock').innerHTML = html || data.discussion;

    // Показываем консенсус
    document.getElementById('phaseConsensus').style.display = '';
    document.getElementById('consensusCard').style.display = '';
    document.getElementById('consensusText').textContent = data.final_consensus;

  } catch (e) {
    document.getElementById('errorMsg').textContent = "Ошибка связи с сервером: " + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = "Спросить →";
  }
}
</script>
</body>
</html>
